<!DOCTYPE html>
<html>
<head>
    <title>Retail Login</title>
    <style>
        body {
            background-color: #e0e0e0; /* Industrial Gray */
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background-color: #ffffff; 
            width: 350px; 
            padding: 40px; 
            border: 5px solid #000000; /* Bold Industrial Border */
            box-shadow: 12px 12px 0px #FF8C00; /* Hard Flat Shadow */
            color: #000000;
            text-align: center;
            text-transform: uppercase;
        }

        h2 {
            font-size: 32px;
            margin-top: 0;
            border-bottom: 5px solid #000000;
            display: inline-block;
            margin-bottom: 30px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input {
            width: 90%;
            padding: 12px;
            border: 4px solid #000000;
            font-size: 16px;
            margin-bottom: 25px;
            outline: none;
            background: #f9f9f9;
        }

        input:focus {
            background-color: #FF8C00;
            color: white;
        }

        button {
            padding: 15px;
            cursor: pointer;
            background-color: #000000; 
            color: #FF8C00; 
            border: none;
            font-size: 20px;
            font-weight: 900;
            width: 100%;
            transition: 0.1s;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #333;
            transform: translate(-3px, -3px);
            box-shadow: 5px 5px 0px #FF8C00;
        }

        button:active {
            transform: translate(0, 0);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form action="Retail_StockMaster.html">
            <label>Username</label>
            <input type="text" required>
            <label>Password</label>
            <input type="password" required>
            <button type="submit">Access System</button>
        </form>
    </div>
</body>
</html>
