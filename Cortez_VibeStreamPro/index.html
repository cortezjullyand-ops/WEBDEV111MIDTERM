<!DOCTYPE html>
<html>
<head>
    <title>Spotify Ni JulliLand</title>
    <style>
        body {
            background-image: linear-gradient(rgba(2, 5, 48, 0.7), rgba(2, 5, 48, 0.7)), url('MusicImg1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
        }

        table {
            width: 100%;
        }

        .login-box {
            background-color: rgba(173, 216, 230, 0.9);
            width: 350px; 
            padding: 20px; 
            border: 3px solid #000000; 
            margin: 100px auto; 
            border-radius: 15px; 
            font-family: Arial, sans-serif;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 80%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #1DB954;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            width: 50%;
        }

        button:hover {
            background-color: #1ed760;
        }
    </style>
</head>
<body>

<table>
  <tr>
    <td><img src="Logo.jpg" border="2" width="160" height="150"></td>
    <td><img src="NewMusicBanner.jpg" border="2" width="1175" height="150"></td>
  </tr>
</table>

<div class="login-box">
    <center>
        <h2>Login</h2>
        <form action="WebHome.html">
            <label>Username</label><br>
            <input type="text" required><br><br>
            
            <label>Password</label><br>
            <input type="password" required><br><br>
            
            <button type="submit">Login</button>
        </form>
    </center>
</div>

</body>
</html>
