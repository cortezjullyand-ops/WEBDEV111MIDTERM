<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS EVENTS | ONCE IN A LIFETIME EXPERIENCES</title>
    <style>
        :root {
            --neon-pink: #FF00FF;
            --electric-blue: #00F0FF;
            --lemon-yellow: #FFF500;
            --ink-black: #000000;
            --white: #ffffff;
        }

        /* NEW ANIMATIONS */
        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--electric-blue);
            color: var(--ink-black);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--white);
            border-bottom: 6px solid var(--ink-black);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 32px; font-weight: 900; text-transform: uppercase; font-style: italic; cursor: pointer; }

        .nav-links button {
            background: var(--lemon-yellow);
            border: 4px solid var(--ink-black);
            padding: 10px 20px;
            margin-left: 15px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink-black);
            transition: 0.1s;
        }

        .nav-links button:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--ink-black); }

        .poster-header {
            position: relative;
            padding: 120px 40px;
            text-align: left;
            border-bottom: 6px solid var(--ink-black);
            background: var(--neon-pink);
            min-height: 400px;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .poster-header::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('Img1.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .poster-header h1 {
            position: relative;
            z-index: 2;
            font-size: clamp(60px, 12vw, 150px);
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -5px;
            color: var(--white);
            -webkit-text-stroke: 3px var(--ink-black);
            paint-order: stroke fill;
        }

        .buy-now-sticky {
            background: var(--lemon-yellow);
            padding: 30px;
            border: 6px solid var(--ink-black);
            display: inline-block;
            margin-top: -30px;
            margin-left: 40px;
            box-shadow: 12px 12px 0px var(--ink-black);
            cursor: pointer;
            font-size: 24px;
            font-weight: 900;
            transition: 0.1s;
            position: relative;
            z-index: 10;
        }

        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 240, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .event-container {
            padding: 80px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .event-card {
            background: var(--white);
            border: 6px solid var(--ink-black);
            box-shadow: 10px 10px 0px var(--ink-black);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
        }

        .event-card:hover {
            transform: scale(1.02) rotate(-1deg);
            box-shadow: 15px 15px 0px var(--neon-pink);
        }

        .event-card img { width: 100%; height: 350px; object-fit: cover; border-bottom: 6px solid var(--ink-black); }
        .event-card-body { padding: 25px; }

        .ticket-wallet {
            padding: 60px 40px;
            background: var(--ink-black);
            color: white;
            border-top: 6px solid var(--lemon-yellow);
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .ticket-stub {
            background: var(--white);
            color: black;
            padding: 20px;
            border-left: 10px dashed var(--neon-pink);
            border-right: 4px solid black;
            border-top: 4px solid black;
            border-bottom: 4px solid black;
            animation: slideIn 0.4s ease-out;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--white);
            border: 8px solid var(--ink-black);
            padding: 40px;
            width: 450px;
            box-shadow: 25px 25px 0px var(--ink-black);
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .booking-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 4px solid var(--ink-black);
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn-xl {
            width: 100%;
            padding: 20px;
            background: var(--electric-blue);
            border: 5px solid var(--ink-black);
            font-size: 22px;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--ink-black);
            transition: 0.1s;
        }

        .btn-xl:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--ink-black); }

        .guestlist-btn {
            position: fixed;
            bottom: 40px; right: 40px;
            background: var(--neon-pink);
            border: 5px solid var(--ink-black);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 8px 8px 0px var(--ink-black);
            cursor: pointer;
            z-index: 100;
            color: white;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="window.scrollTo(0,0)">NEXUS</div>
        <div class="nav-links">
            <button onclick="document.querySelector('.event-container').scrollIntoView()">EVENTS</button>
            <button onclick="document.querySelector('.ticket-wallet').scrollIntoView()">TICKETS</button>
            <button onclick="showVenue()">VENUE</button>
        </div>
    </nav>

    <div class="auth-overlay" id="authOverlay">
        <div class="modal-content" style="text-align: center;">
            <h1>NEXUS ID</h1>
            <input type="text" id="loginUser" class="booking-input" placeholder="GUEST NAME">
            <input type="password" class="booking-input" placeholder="PASSWORD">
            <button class="btn-xl" style="background: var(--lemon-yellow);" onclick="login()">GET ACCESS</button>
        </div>
    </div>

    <header class="poster-header">
        <h1>BEYOND<br>THE<br>NEXUS.</h1>
    </header>
    <div class="buy-now-sticky" onclick="document.querySelector('.event-container').scrollIntoView()">JOIN THE VIBE ↓</div>

    <main class="event-container">
        <div class="event-card" onclick="openOrder('CYBERPUNK RAVE', 'Img1.jpg')">
            <img src="Img1.jpg" alt="Event 1">
            <div class="event-card-body"><h2>CYBERPUNK RAVE</h2><p>LIVE @ THE DOCK</p></div>
        </div>
        <div class="event-card" onclick="openOrder('NEON ROOFTOP', 'Img2.jpg')">
            <img src="Img2.jpg" alt="Event 2">
            <div class="event-card-body"><h2>NEON ROOFTOP</h2><p>SUMMER VIBES</p></div>
        </div>
        <div class="event-card" onclick="openOrder('TECHNO BASEMENT', 'Img3.jpg')">
            <img src="Img3.jpg" alt="Event 3">
            <div class="event-card-body"><h2>TECHNO BASEMENT</h2><p>DARK SESSION</p></div>
        </div>
        <div class="event-card" onclick="openOrder('ULTRA FEST', 'Img4.jpg')">
            <img src="Img4.jpg" alt="Event 4">
            <div class="event-card-body"><h2>ULTRA FEST</h2><p>MAIN STAGE</p></div>
        </div>
    </main>

    <section class="ticket-wallet">
        <h2 style="font-size: 40px; margin: 0; color: var(--electric-blue);">TICKET VAULT</h2>
        <div class="wallet-grid" id="wallet">
            <p id="emptyMsg">Your vault is empty. Secure a pass above.</p>
        </div>
    </section>

    <button class="guestlist-btn" onclick="showGuestlist()">CHECK GUESTLIST</button>

    <div class="modal" id="masterModal">
        <div class="modal-content" id="modalTarget"></div>
    </div>

    <script>
        let session = { user: "ANONYMOUS", tickets: [], guestlist: ["Ghost_Link", "Data_Stream", "Void_Walker"] };

        function login() {
            const name = document.getElementById('loginUser').value;
            if(name) session.user = name;
            document.getElementById('authOverlay').style.display='none';
        }

        function openOrder(name, img) {
            const modal = document.getElementById('masterModal');
            const target = document.getElementById('modalTarget');
            modal.style.display = 'flex';
            
            target.innerHTML = `
                <img src="${img}" style="width:100%; height:120px; object-fit:cover; border:4px solid #000;">
                <h2 style="margin: 15px 0 5px 0;">${name}</h2>
                <p style="margin-bottom: 15px; font-size: 14px;">ENTER SECURE DETAILS TO PROCEED:</p>
                
                <input type="email" id="bookEmail" class="booking-input" placeholder="EMAIL ADDRESS">
                <select id="ticketQty" class="booking-input">
                    <option value="1">1 TICKET</option>
                    <option value="2">2 TICKETS</option>
                    <option value="4">4 TICKETS (SQUAD PACK)</option>
                </select>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-xl" style="background:var(--lemon-yellow); font-size: 16px; margin-top:10px;" 
                            onclick="processBooking('${name}', 'VIP PASS')">VIP $200</button>
                    <button class="btn-xl" style="background:var(--white); font-size: 16px; margin-top:10px;" 
                            onclick="processBooking('${name}', 'GEN AD')">GEN $80</button>
                </div>
                <p onclick="closeModal()" style="cursor:pointer; text-decoration:underline; margin-top:15px; text-align:center;">ABORT MISSION</p>
            `;
        }

        function processBooking(event, tier) {
            const email = document.getElementById('bookEmail').value;
            const qty = document.getElementById('ticketQty').value;

            if(!email.includes('@')) {
                alert("ACCESS DENIED: INVALID EMAIL");
                return;
            }

            const target = document.getElementById('modalTarget');
            target.innerHTML = `<h2 style="animation: glitch 0.2s infinite; text-align:center; padding: 40px;">ENCRYPTING...</h2>`;
            
            setTimeout(() => {
                book(event, tier, qty);
            }, 800);
        }

        function book(event, tier, qty) {
            const id = "NX-" + Math.floor(Math.random()*8999 + 1000);
            session.tickets.push({ event, tier, id, qty });
            session.guestlist.unshift(session.user);
            
            const target = document.getElementById('modalTarget');
            target.innerHTML = `
                <div style="border: 4px solid var(--neon-pink); padding: 10px; text-align: center;">
                    <h1 style="color:var(--neon-pink); margin: 0;">ACCESS GRANTED</h1>
                    <p style="font-size: 12px; margin-top: 5px;">ID: ${id}</p>
                </div>
                <div style="text-align: left; margin: 20px 0; background: #f0f0f0; padding: 15px; border: 2px solid black;">
                    <p><b>GUEST:</b> ${session.user}</p>
                    <p><b>TIER:</b> ${tier}</p>
                    <p><b>QTY:</b> ${qty} UNIT(S)</p>
                </div>
                <button class="btn-xl" style="background: var(--electric-blue)" onclick="refreshWallet(); closeModal();">SYNC TO VAULT</button>
            `;
        }

        function refreshWallet() {
            const wallet = document.getElementById('wallet');
            document.getElementById('emptyMsg').style.display = 'none';
            wallet.innerHTML = session.tickets.map(t => `
                <div class="ticket-stub">
                    <small style="letter-spacing: 2px; font-weight:bold;">${t.id}</small>
                    <h3 style="margin:5px 0">${t.event}</h3>
                    <p style="margin:0; font-size: 12px;">${t.tier} | QTY: ${t.qty}</p>
                </div>
            `).join('');
        }

        function showVenue() {
            const modal = document.getElementById('masterModal');
            const target = document.getElementById('modalTarget');
            modal.style.display = 'flex';
            target.innerHTML = `
                <h2>VENUE MAP</h2>
                <div style="border:5px solid black; padding:20px; background:#ddd;">
                    <div style="background:var(--electric-blue); border:2px solid black; padding:10px; margin-bottom:10px;">MAIN STAGE</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div style="border:2px solid black; padding:10px;">VIP LOUNGE</div>
                        <div style="border:2px solid black; padding:10px;">THE VAULT</div>
                    </div>
                </div>
                <button class="btn-xl" onclick="closeModal()">EXIT MAP</button>
            `;
        }

        function showGuestlist() {
            const modal = document.getElementById('masterModal');
            const target = document.getElementById('modalTarget');
            modal.style.display = 'flex';
            const names = session.guestlist.slice(0, 5).map(g => `<div style="padding:10px; border-bottom:3px solid black;">• ${g.toUpperCase()}</div>`).join('');
            target.innerHTML = `
                <h2>GUESTLIST</h2>
                <div style="text-align:left; margin:20px 0;">${names}</div>
                <button class="btn-xl" onclick="closeModal()">CLOSE</button>
            `;
        }

        function closeModal() { document.getElementById('masterModal').style.display = 'none'; }
    </script>
</body>
</html>
