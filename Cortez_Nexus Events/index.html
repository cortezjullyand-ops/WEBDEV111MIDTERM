<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS EVENTS | ONCE IN A LIFETIME EXPERIENCES</title>
    <style>
        :root {
            --neon-pink: #FF00FF;
            --electric-blue: #00F0FF;
            --lemon-yellow: #FFF500;
            --ink-black: #000000;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--electric-blue);
            color: var(--ink-black);
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--white);
            border-bottom: 6px solid var(--ink-black);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 32px; font-weight: 900; text-transform: uppercase; font-style: italic; cursor: pointer; }

        .nav-links button {
            background: var(--lemon-yellow);
            border: 4px solid var(--ink-black);
            padding: 10px 20px;
            margin-left: 15px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink-black);
            transition: 0.1s;
        }

        .nav-links button:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--ink-black); }
        .nav-links button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--ink-black); }

        .poster-header {
            padding: 60px 40px;
            text-align: left;
            border-bottom: 6px solid var(--ink-black);
            background: var(--neon-pink);
            background-image: linear-gradient(rgba(255,0,255,0.7), rgba(255,0,255,0.7)), url('Nexus_Img1.jpg');
            background-size: cover;
            background-position: center;
        }

        .poster-header h1 {
            font-size: clamp(60px, 12vw, 150px);
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -5px;
            color: var(--white);
            -webkit-text-stroke: 3px var(--ink-black);
        }

        .buy-now-sticky {
            background: var(--lemon-yellow);
            padding: 30px;
            border: 6px solid var(--ink-black);
            display: inline-block;
            margin-top: -30px;
            margin-left: 40px;
            box-shadow: 12px 12px 0px var(--ink-black);
            cursor: pointer;
            font-size: 24px;
            font-weight: 900;
            transition: 0.1s;
        }

        .buy-now-sticky:hover { transform: scale(1.05); }

        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 240, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .pop-card {
            background: var(--white);
            padding: 50px;
            border: 8px solid var(--ink-black);
            box-shadow: 20px 20px 0px var(--ink-black);
            width: 400px;
            text-align: center;
        }

        .pop-card input {
            width: 90%;
            padding: 15px;
            margin-bottom: 20px;
            border: 4px solid var(--ink-black);
            font-size: 18px;
            font-family: inherit;
        }

        .event-container {
            padding: 50px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .event-card {
            background: var(--white);
            border: 6px solid var(--ink-black);
            box-shadow: 10px 10px 0px var(--ink-black);
            transition: 0.2s;
            cursor: pointer;
            overflow: hidden;
        }

        .event-card:hover { transform: translate(-5px, -5px); box-shadow: 15px 15px 0px var(--ink-black); }
        .event-card img { width: 100%; height: 350px; object-fit: cover; border-bottom: 6px solid var(--ink-black); }
        .event-card-body { padding: 25px; }

        .guestlist-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--neon-pink);
            border: 5px solid var(--ink-black);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 8px 8px 0px var(--ink-black);
            cursor: pointer;
            z-index: 100;
            color: white;
            transition: 0.1s;
        }

        .guestlist-btn:hover { background: var(--lemon-yellow); color: black; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--white);
            border: 8px solid var(--ink-black);
            padding: 40px;
            width: 450px;
            box-shadow: 25px 25px 0px var(--ink-black);
            position: relative;
        }

        .btn-xl {
            width: 100%;
            padding: 20px;
            background: var(--electric-blue);
            border: 5px solid var(--ink-black);
            font-size: 22px;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--ink-black);
            transition: 0.1s;
        }

        .btn-xl:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px var(--ink-black); }

        .qr-placeholder {
            width: 180px;
            height: 180px;
            background: var(--ink-black);
            margin: 20px auto;
            border: 4px solid var(--lemon-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">NEXUS</div>
        <div class="nav-links">
            <button onclick="document.querySelector('.event-container').scrollIntoView()">EVENTS</button>
            <button onclick="alert('Ticket Wallet Empty')">TICKETS</button>
            <button onclick="alert('Venue Maps Loading...')">VENUE</button>
        </div>
    </nav>

    <div class="auth-overlay" id="authOverlay">
        <div class="pop-card">
            <h1>NEXUS ID</h1>
            <input type="text" placeholder="GUEST NAME">
            <input type="password" placeholder="PASSWORD">
            <button class="btn-xl" style="background: var(--lemon-yellow);" onclick="document.getElementById('authOverlay').style.display='none'">GET ACCESS</button>
        </div>
    </div>

    <header class="poster-header">
        <h1>BEYOND<br>THE<br>NEXUS.</h1>
    </header>
    <div class="buy-now-sticky" onclick="document.querySelector('.event-container').scrollIntoView()">JOIN THE VIBE ↓</div>

    <main class="event-container">
        <div class="event-card" onclick="openOrder('CYBERPUNK RAVE', 'Nexus_Img1.jpg')">
            <img src="Img1.jpg" alt="Event 1">
            <div class="event-card-body"><h2>CYBERPUNK RAVE</h2><p>LIVE @ THE DOCK</p></div>
        </div>
        <div class="event-card" onclick="openOrder('NEON ROOFTOP', 'Nexus_Img2.jpg')">
            <img src="Img2.jpg" alt="Event 2">
            <div class="event-card-body"><h2>NEON ROOFTOP</h2><p>SUMMER VIBES</p></div>
        </div>
        <div class="event-card" onclick="openOrder('TECHNO BASEMENT', 'Nexus_Img3.jpg')">
            <img src="Img3.jpg" alt="Event 3">
            <div class="event-card-body"><h2>TECHNO BASEMENT</h2><p>DARK SESSION</p></div>
        </div>
        <div class="event-card" onclick="openOrder('ULTRA FEST', 'Nexus_Img4.jpg')">
            <img src="Img4.jpg" alt="Event 4">
            <div class="event-card-body"><h2>ULTRA FEST</h2><p>MAIN STAGE</p></div>
        </div>
    </main>

    <button class="guestlist-btn" onclick="alert('Current Guestlist: 2,490 Verified Guests')">CHECK GUESTLIST</button>

    <div class="modal" id="orderModal">
        <div class="modal-content" id="modalTarget"></div>
    </div>

    <script>
        let state = { event: "", tier: "", user: "" };

        function openOrder(name, img) {
            state.event = name;
            const modal = document.getElementById('orderModal');
            const target = document.getElementById('modalTarget');
            modal.style.display = 'flex';
            target.innerHTML = `
                <img src="${img}" style="width:100%; height:150px; object-fit:cover; border:4px solid #000;">
                <h2>${name}</h2>
                <p>SELECT TICKET:</p>
                <button class="btn-xl" style="background:var(--lemon-yellow)" onclick="selectTier('VIP PASS')">VIP PASS - $200</button>
                <button class="btn-xl" style="background:var(--white)" onclick="selectTier('GEN ADMISSION')">GEN AD - $80</button>
                <p onclick="document.getElementById('orderModal').style.display='none'" style="cursor:pointer; text-decoration:underline; margin-top:15px; text-align:center;">CANCEL</p>
            `;
        }

        function selectTier(tier) {
            state.tier = tier;
            const target = document.getElementById('modalTarget');
            target.innerHTML = `
                <h2>ATTENDEE</h2>
                <input type="text" id="userName" placeholder="ENTER YOUR NAME" style="width:90%; padding:15px; border:4px solid #000; font-size:18px;">
                <button class="btn-xl" style="background:var(--neon-pink); color:white;" onclick="confirmTicket()">GENERATE TICKET</button>
            `;
        }

        function confirmTicket() {
            state.user = document.getElementById('userName').value || "ANONYMOUS";
            const target = document.getElementById('modalTarget');
            target.innerHTML = `
                <h1 style="color:var(--neon-pink)">CONFIRMED</h1>
                <p>NAME: ${state.user}</p>
                <p>ACCESS: ${state.tier}</p>
                <div class="qr-placeholder">NEXUS-AUTH-${Math.random().toString(36).substr(2, 9).toUpperCase()}</div>
                <button class="btn-xl" onclick="document.getElementById('orderModal').style.display='none'">SAVE TO PHONE</button>
            `;
        }
    </script>
</body>
</html>
