<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS EVENTS | ONCE IN A LIFETIME EXPERIENCES</title>
    <style>
        :root {
            --neon-pink: #FF00FF;
            --electric-blue: #00F0FF;
            --lemon-yellow: #FFF500;
            --ink-black: #000000;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--electric-blue);
            color: var(--ink-black);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--white);
            border-bottom: 6px solid var(--ink-black);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 32px; font-weight: 900; text-transform: uppercase; font-style: italic; cursor: pointer; }

        .nav-links button {
            background: var(--lemon-yellow);
            border: 4px solid var(--ink-black);
            padding: 10px 20px;
            margin-left: 15px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink-black);
            transition: 0.1s;
        }

        .nav-links button:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--ink-black); }

        .poster-header {
            padding: 100px 40px;
            text-align: left;
            border-bottom: 6px solid var(--ink-black);
            background: var(--neon-pink);
            background-image: linear-gradient(rgba(255,0,255,0.7), rgba(255,0,255,0.7)), url('Nexus_Img1.jpg');
            background-size: cover;
            background-position: center;
        }

        .poster-header h1 {
            font-size: clamp(60px, 12vw, 150px);
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -5px;
            color: var(--white);
            -webkit-text-stroke: 3px var(--ink-black);
        }

        .buy-now-sticky {
            background: var(--lemon-yellow);
            padding: 30px;
            border: 6px solid var(--ink-black);
            display: inline-block;
            margin-top: -30px;
            margin-left: 40px;
            box-shadow: 12px 12px 0px var(--ink-black);
            cursor: pointer;
            font-size: 24px;
            font-weight: 900;
            transition: 0.1s;
            position: relative;
            z-index: 10;
        }

        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 240, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .pop-card {
            background: var(--white);
            padding: 50px;
            border: 8px solid var(--ink-black);
            box-shadow: 20px 20px 0px var(--ink-black);
            width: 400px;
            text-align: center;
        }

        .pop-card input {
            width: 90%;
            padding: 15px;
            margin-bottom: 20px;
            border: 4px solid var(--ink-black);
            font-size: 18px;
            font-family: inherit;
        }

        .event-container {
            padding: 50px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .event-card {
            background: var(--white);
            border: 6px solid var(--ink-black);
            box-shadow: 10px 10px 0px var(--ink-black);
            transition: 0.2s;
            cursor: pointer;
            overflow: hidden;
        }

        .event-card:hover { transform: translate(-5px, -5px); box-shadow: 15px 15px 0px var(--ink-black); }
        .event-card img { width: 100%; height: 350px; object-fit: cover; border-bottom: 6px solid var(--ink-black); }
        .event-card-body { padding: 25px; }

        /* TICKET WALLET SECTION */
        .ticket-wallet {
            padding: 60px 40px;
            background: var(--ink-black);
            color: var(--white);
            border-top: 6px solid var(--lemon-yellow);
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .mini-ticket {
            background: var(--white);
            color: black;
            padding: 15px;
            border: 4px solid var(--neon-pink);
            position: relative;
        }

        .guestlist-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--neon-pink);
            border: 5px solid var(--ink-black);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 8px 8px 0px var(--ink-black);
            cursor: pointer;
            z-index: 100;
            color: white;
            transition: 0.1s;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--white);
            border: 8px solid var(--ink-black);
            padding: 40px;
            width: 450px;
            box-shadow: 25px 25px 0px var(--ink-black);
            position: relative;
        }

        /* VENUE MAP STYLING */
        .map-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .map-room {
            border: 3px solid black;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            background: #eee;
        }
        .map-room.active-room { background: var(--electric-blue); }

        .btn-xl {
            width: 100%;
            padding: 20px;
            background: var(--electric-blue);
            border: 5px solid var(--ink-black);
            font-size: 22px;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--ink-black);
            transition: 0.1s;
        }

        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: var(--ink-black);
            margin: 20px auto;
            border: 4px solid var(--lemon-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            text-align: center;
            word-break: break-all;
            padding: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="location.reload()">NEXUS</div>
        <div class="nav-links">
            <button onclick="document.querySelector('.event-container').scrollIntoView()">EVENTS</button>
            <button onclick="document.querySelector('.ticket-wallet').scrollIntoView()">TICKETS</button>
            <button onclick="toggleVenueMap()">VENUE</button>
        </div>
    </nav>

    <div class="auth-overlay" id="authOverlay">
        <div class="pop-card">
            <h1>NEXUS ID</h1>
            <input type="text" id="loginName" placeholder="GUEST NAME">
            <input type="password" placeholder="PASSWORD">
            <button class="btn-xl" style="background: var(--lemon-yellow);" onclick="handleAuth()">GET ACCESS</button>
        </div>
    </div>

    <header class="poster-header">
        <h1>BEYOND<br>THE<br>NEXUS.</h1>
    </header>
    <div class="buy-now-sticky" onclick="document.querySelector('.event-container').scrollIntoView()">JOIN THE VIBE ↓</div>

    <main class="event-container">
        <div class="event-card" onclick="openOrder('CYBERPUNK RAVE', 'Nexus_Img1.jpg')">
            <img src="Img1.jpg" alt="Event 1">
            <div class="event-card-body"><h2>CYBERPUNK RAVE</h2><p>LIVE @ THE DOCK</p></div>
        </div>
        <div class="event-card" onclick="openOrder('NEON ROOFTOP', 'Nexus_Img2.jpg')">
            <img src="Img2.jpg" alt="Event 2">
            <div class="event-card-body"><h2>NEON ROOFTOP</h2><p>SUMMER VIBES</p></div>
        </div>
        <div class="event-card" onclick="openOrder('TECHNO BASEMENT', 'Nexus_Img3.jpg')">
            <img src="Img3.jpg" alt="Event 3">
            <div class="event-card-body"><h2>TECHNO BASEMENT</h2><p>DARK SESSION</p></div>
        </div>
        <div class="event-card" onclick="openOrder('ULTRA FEST', 'Nexus_Img4.jpg')">
            <img src="Img4.jpg" alt="Event 4">
            <div class="event-card-body"><h2>ULTRA FEST</h2><p>MAIN STAGE</p></div>
        </div>
    </main>

    <section class="ticket-wallet">
        <h2 style="font-size: 40px; margin: 0; color: var(--electric-blue);">YOUR DIGITAL WALLET</h2>
        <div class="wallet-grid" id="walletContainer">
            <p id="emptyWalletMsg">No active tickets. Book an event to see them here.</p>
        </div>
    </section>

    <button class="guestlist-btn" onclick="toggleGuestlist()">CHECK GUESTLIST</button>

    <div class="modal" id="orderModal">
        <div class="modal-content" id="modalTarget"></div>
    </div>

    <script>
        let state = { event: "", tier: "", user: "GUEST", tickets: [], guestlist: ["CyberNaut_99", "TechnoQueen", "NeonVibe"] };

        function handleAuth() {
            const name = document.getElementById('loginName').value;
            if(name) state.user = name;
            document.getElementById('authOverlay').style.display='none';
        }

        function openOrder(name, img) {
            state.event = name;
            const modal = document.getElementById('orderModal');
            const target = document.getElementById('modalTarget');
            modal.style.display = 'flex';
            target.innerHTML = `
                <img src="${img}" style="width:100%; height:150px; object-fit:cover; border:4px solid #000;">
                <h2>${name}</h2>
                <p>SELECT TICKET:</p>
                <button class="btn-xl" style="background:var(--lemon-yellow)" onclick="selectTier('VIP PASS')">VIP PASS - $200</button>
                <button class="btn-xl" style="background:var(--white)" onclick="selectTier('GEN ADMISSION')">GEN AD - $80</button>
                <p onclick="closeModal()" style="cursor:pointer; text-decoration:underline; margin-top:15px; text-align:center;">CANCEL</p>
            `;
        }

        function selectTier(tier) {
            state.tier = tier;
            confirmTicket();
        }

        function confirmTicket() {
            const ticketId = "NX-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const newTicket = { id: ticketId, event: state.event, tier: state.tier, user: state.user };
            state.tickets.push(newTicket);
            state.guestlist.unshift(state.user); // Add user to guestlist

            const target = document.getElementById('modalTarget');
            target.innerHTML = `
                <h1 style="color:var(--neon-pink)">SUCCESS</h1>
                <p>EVENT: ${state.event}</p>
                <p>ACCESS: ${state.tier}</p>
                <div class="qr-placeholder">${ticketId}</div>
                <button class="btn-xl" onclick="updateWallet(); closeModal();">VIEW IN WALLET</button>
            `;
        }

        function updateWallet() {
            const container = document.getElementById('walletContainer');
            const emptyMsg = document.getElementById('emptyWalletMsg');
            if(emptyMsg) emptyMsg.remove();

            const lastTicket = state.tickets[state.tickets.length - 1];
            const ticketEl = document.createElement('div');
            ticketEl.className = 'mini-ticket';
            ticketEl.innerHTML = `
                <div style="font-size:10px; color:var(--neon-pink)">${lastTicket.id}</div>
                <div style="font-weight:900; font-size:18px;">${lastTicket.event}</div>
                <div style="font-size:12px;">${lastTicket.tier}</div>
                <div style="margin-top:10px; font-size:10px; background:#000; color:#fff; display:inline-block; padding:2px 5px;">VALIDATED</div>
            `;
            container.appendChild(ticketEl);
        }

        function toggleVenueMap() {
            const modal = document.getElementById('orderModal');
            const target = document.getElementById('modalTarget');
            modal.style.display = 'flex';
            target.innerHTML = `
                <h2>NEXUS VENUE MAP</h2>
                <div class="map-grid">
                    <div class="map-room active-room">MAIN STAGE</div>
                    <div class="map-room">VIP LOUNGE</div>
                    <div class="map-room">TECHNO VAULT</div>
                    <div class="map-room">SKY BAR</div>
                </div>
                <button class="btn-xl" onclick="closeModal()">CLOSE MAP</button>
            `;
        }

        function toggleGuestlist() {
            const modal = document.getElementById('orderModal');
            const target = document.getElementById('modalTarget');
            modal.style.display = 'flex';
            
            let listHtml = state.guestlist.slice(0, 5).map(name => 
                `<div style="border-bottom:2px solid #000; padding:10px;">• ${name.toUpperCase()} <span style="float:right; color:green;">✓</span></div>`
            ).join('');

            target.innerHTML = `
                <h2>LIVE GUESTLIST</h2>
                <div style="text-align:left; margin:20px 0;">
                    ${listHtml}
                </div>
                <p style="font-size:12px;">+ 2,490 others currently inside.</p>
                <button class="btn-xl" onclick="closeModal()">BACK TO SITE</button>
            `;
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }
    </script>
</body>
</html>
