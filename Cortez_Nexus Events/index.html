<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS EVENTS | ONCE IN A LIFETIME EXPERIENCES</title>
    <style>
        :root {
            --neon-pink: #FF00FF;
            --electric-blue: #00F0FF;
            --lemon-yellow: #FFF500;
            --ink-black: #000000;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--electric-blue);
            color: var(--ink-black);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* NAVIGATION */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--white);
            border-bottom: 6px solid var(--ink-black);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 32px; font-weight: 900; text-transform: uppercase; font-style: italic; cursor: pointer; }

        .nav-links button {
            background: var(--lemon-yellow);
            border: 4px solid var(--ink-black);
            padding: 10px 20px;
            margin-left: 15px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink-black);
            transition: 0.1s;
        }

        .nav-links button:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--ink-black); }

        /* HEADER WITH BACKGROUND IMAGE BEHIND TEXT */
        .poster-header {
            position: relative;
            height: 70vh;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 6px solid var(--ink-black);
            overflow: hidden;
            background: var(--ink-black);
        }

        .poster-bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('Nexus_Img1.jpg'); /* Image behind text */
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: 1;
        }

        .poster-header h1 {
            position: relative;
            z-index: 2; /* Text in front of image */
            font-size: clamp(60px, 12vw, 150px);
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -5px;
            color: var(--white);
            -webkit-text-stroke: 3px var(--ink-black);
        }

        .buy-now-sticky {
            background: var(--lemon-yellow);
            padding: 30px;
            border: 6px solid var(--ink-black);
            display: inline-block;
            margin-top: -40px;
            margin-left: 40px;
            box-shadow: 12px 12px 0px var(--ink-black);
            cursor: pointer;
            font-size: 24px;
            font-weight: 900;
            position: relative;
            z-index: 10;
        }

        /* AUTH / LOGIN */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 240, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .pop-card {
            background: var(--white);
            padding: 50px;
            border: 8px solid var(--ink-black);
            box-shadow: 20px 20px 0px var(--ink-black);
            width: 400px;
            text-align: center;
        }

        .pop-card input {
            width: 95%;
            padding: 15px;
            margin-bottom: 20px;
            border: 4px solid var(--ink-black);
            font-size: 18px;
            font-family: inherit;
        }

        /* GRID SYSTEM */
        .event-container {
            padding: 80px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .event-card {
            background: var(--white);
            border: 6px solid var(--ink-black);
            box-shadow: 10px 10px 0px var(--ink-black);
            cursor: pointer;
            overflow: hidden;
        }

        .event-card img { width: 100%; height: 350px; object-fit: cover; border-bottom: 6px solid var(--ink-black); }
        .event-card-body { padding: 25px; }

        /* TICKET VAULT */
        .ticket-vault {
            padding: 60px 40px;
            background: var(--ink-black);
            color: white;
            border-top: 6px solid var(--lemon-yellow);
        }

        .vault-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .ticket-item {
            background: var(--white);
            color: black;
            padding: 20px;
            border: 4px solid var(--neon-pink);
            min-width: 250px;
        }

        /* MODALS */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--white);
            border: 8px solid var(--ink-black);
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 25px 25px 0px var(--ink-black);
        }

        .btn-xl {
            width: 100%;
            padding: 20px;
            background: var(--electric-blue);
            border: 5px solid var(--ink-black);
            font-size: 20px;
            font-weight: 900;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--ink-black);
        }

        .btn-xl:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px var(--ink-black); }

        .guestlist-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--neon-pink);
            border: 5px solid var(--ink-black);
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 8px 8px 0px var(--ink-black);
            cursor: pointer;
            z-index: 100;
            color: white;
        }

        .map-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .map-zone {
            background: #eee;
            border: 2px solid #000;
            padding: 20px;
            text-align: center;
            font-size: 12px;
        }
        .map-zone.active { background: var(--electric-blue); }
    </style>
</head>
<body>

    <div class="auth-overlay" id="authOverlay">
        <div class="pop-card">
            <h1>NEXUS ID</h1>
            <input type="text" id="guestName" placeholder="GUEST NAME">
            <input type="password" placeholder="PASSWORD">
            <button class="btn-xl" style="background: var(--lemon-yellow);" onclick="login()">GET ACCESS</button>
        </div>
    </div>

    <nav>
        <div class="logo" onclick="window.scrollTo(0,0)">NEXUS</div>
        <div class="nav-links">
            <button onclick="document.getElementById('events').scrollIntoView()">EVENTS</button>
            <button onclick="document.getElementById('tickets').scrollIntoView()">TICKETS</button>
            <button onclick="openVenue()">VENUE</button>
        </div>
    </nav>

    <header class="poster-header">
        <div class="poster-bg-img"></div>
        <h1>BEYOND<br>THE<br>NEXUS.</h1>
    </header>

    <div class="buy-now-sticky" onclick="document.getElementById('events').scrollIntoView()">JOIN THE VIBE ↓</div>

    <main class="event-container" id="events">
        <div class="event-card" onclick="startBooking('CYBERPUNK RAVE', 'Img1.jpg')">
            <img src="Img1.jpg" alt="Event 1">
            <div class="event-card-body"><h2>CYBERPUNK RAVE</h2><p>LIVE @ THE DOCK</p></div>
        </div>
        <div class="event-card" onclick="startBooking('NEON ROOFTOP', 'Img2.jpg')">
            <img src="Img2.jpg" alt="Event 2">
            <div class="event-card-body"><h2>NEON ROOFTOP</h2><p>SUMMER VIBES</p></div>
        </div>
        <div class="event-card" onclick="startBooking('TECHNO BASEMENT', 'Img3.jpg')">
            <img src="Img3.jpg" alt="Event 3">
            <div class="event-card-body"><h2>TECHNO BASEMENT</h2><p>DARK SESSION</p></div>
        </div>
        <div class="event-card" onclick="startBooking('ULTRA FEST', 'Img4.jpg')">
            <img src="Img4.jpg" alt="Event 4">
            <div class="event-card-body"><h2>ULTRA FEST</h2><p>MAIN STAGE</p></div>
        </div>
    </main>

    <section class="ticket-vault" id="tickets">
        <h2 style="font-size: 40px; margin: 0; color: var(--electric-blue);">MY TICKETS</h2>
        <div class="vault-grid" id="ticketList">
            <p id="noTickets">No tickets generated yet.</p>
        </div>
    </section>

    <button class="guestlist-btn" onclick="openGuestlist()">CHECK GUESTLIST</button>

    <div class="modal" id="masterModal">
        <div class="modal-content" id="modalBody"></div>
    </div>

    <script>
        let userData = { name: "ANONYMOUS", tickets: [], guestlist: ["Viper_01", "Neon_Soul", "BassDrop"] };

        function login() {
            const val = document.getElementById('guestName').value;
            if(val) userData.name = val;
            document.getElementById('authOverlay').style.display = 'none';
        }

        function startBooking(eventTitle, eventImg) {
            const modal = document.getElementById('masterModal');
            const body = document.getElementById('modalBody');
            modal.style.display = 'flex';
            body.innerHTML = `
                <img src="${eventImg}" style="width:100%; height:150px; object-fit:cover; border:4px solid #000;">
                <h2>${eventTitle}</h2>
                <button class="btn-xl" style="background:var(--lemon-yellow)" onclick="confirmTicket('${eventTitle}', 'VIP PASS')">VIP PASS - $200</button>
                <button class="btn-xl" onclick="confirmTicket('${eventTitle}', 'GENERAL ADMIT')">GEN AD - $80</button>
                <p onclick="closeModal()" style="text-align:center; cursor:pointer; text-decoration:underline;">CANCEL</p>
            `;
        }

        function confirmTicket(title, tier) {
            const id = "NX-" + Math.floor(Math.random()*9999);
            userData.tickets.push({ title, tier, id });
            userData.guestlist.unshift(userData.name);
            
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <h1 style="color:var(--neon-pink)">CONFIRMED!</h1>
                <p><b>EVENT:</b> ${title}<br><b>TIER:</b> ${tier}</p>
                <div style="background:#000; color:#fff; padding:20px; text-align:center; letter-spacing:5px;">${id}</div>
                <button class="btn-xl" onclick="refreshTickets(); closeModal();">SAVE TO WALLET</button>
            `;
        }

        function refreshTickets() {
            const list = document.getElementById('ticketList');
            document.getElementById('noTickets').style.display = 'none';
            const last = userData.tickets[userData.tickets.length - 1];
            list.innerHTML += `
                <div class="ticket-item">
                    <small>${last.id}</small>
                    <h3>${last.title}</h3>
                    <p>${last.tier}</p>
                </div>
            `;
        }

        function openVenue() {
            const modal = document.getElementById('masterModal');
            const body = document.getElementById('modalBody');
            modal.style.display = 'flex';
            body.innerHTML = `
                <h2>VENUE LAYOUT</h2>
                <div class="map-box">
                    <div class="map-zone active">MAIN STAGE</div>
                    <div class="map-zone">VIP DECK</div>
                    <div class="map-zone">THE VAULT</div>
                    <div class="map-zone">BAR AREA</div>
                </div>
                <button class="btn-xl" onclick="closeModal()">EXIT MAP</button>
            `;
        }

        function openGuestlist() {
            const modal = document.getElementById('masterModal');
            const body = document.getElementById('modalBody');
            modal.style.display = 'flex';
            let names = userData.guestlist.slice(0, 5).map(n => `<div style="padding:10px; border-bottom:2px solid #000;">• ${n.toUpperCase()}</div>`).join('');
            body.innerHTML = `
                <h2>LIVE GUESTLIST</h2>
                <div style="text-align:left; margin:20px 0;">${names}</div>
                <small>+ 1,402 others verified.</small>
                <button class="btn-xl" onclick="closeModal()">CLOSE</button>
            `;
        }

        function closeModal() { document.getElementById('masterModal').style.display = 'none'; }
    </script>
</body>
</html>
