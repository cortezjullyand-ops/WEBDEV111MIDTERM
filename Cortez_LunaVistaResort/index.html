<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Luna Vista Resort | Login</title>
    <style>
        :root {
            --ocean-blue: #1e3c72;
            --accent-cyan: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--ocean-blue);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* AMBIENT BLURRED BACKGROUND */
        .bg-carousel-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .bg-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            /* The blur effect */
            filter: blur(60px) brightness(0.4) saturate(1.4);
            transition: opacity 1.5s ease-in-out;
            transform: scale(1.1); /* Hides edges created by blur */
        }

        .bg-slide.active-bg { opacity: 1; }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(10, 25, 47, 0.7) 100%);
            z-index: -1;
        }

        .resort-header {
            width: 100%;
            padding: 50px 0;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .resort-header h2 {
            margin: 0;
            font-size: 2.8rem;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 30px;
            padding: 20px;
            max-width: 1100px;
            width: 100%;
            z-index: 1;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .slideshow-box {
            flex: 1.5;
            min-width: 350px;
            position: relative;
        }

        .mySlides img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            display: block;
        }

        .login-box {
            flex: 1;
            min-width: 320px;
            padding: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-box h2 { margin-top: 0; font-size: 1.8rem; line-height: 1.2; }
        .login-box h6 { color: #d1e3ff; margin-bottom: 30px; font-weight: 300; font-size: 0.9rem; letter-spacing: 1px; }

        label {
            display: block;
            text-align: left;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #add8e6;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            outline: none;
            color: #333;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #3a7bd5, var(--accent-cyan));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.5);
        }

        .dot-container {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .dot {
            height: 8px; width: 8px; margin: 0 4px;
            background-color: rgba(255,255,255,0.4);
            border-radius: 50%;
            display: inline-block;
        }

        .active { background-color: #fff; width: 24px; border-radius: 4px; }

        .fade { animation: fadeEffect 1.5s; }
        @keyframes fadeEffect { from { opacity: 0.6; } to { opacity: 1; } }

        @media (max-width: 850px) {
            .main-container { flex-direction: column; }
            .mySlides img { height: 300px; }
        }
    </style>
</head>
<body>

<div class="bg-carousel-container">
    <img src="Slides.jpg" class="bg-slide active-bg">
    <img src="Slides2.jpg" class="bg-slide">
    <img src="Slides3.jpg" class="bg-slide">
    <img src="Slides4.jpg" class="bg-slide">
</div>
<div class="bg-overlay"></div>

<header class="resort-header">
    <h2>Luna Vista Resort</h2>
</header>

<main class="main-container">
    <section class="slideshow-box glass-panel">
        <div class="mySlides fade">
            <img src="Slides.jpg" alt="View 1">
        </div>
        <div class="mySlides fade">
            <img src="Slides2.jpg" alt="View 2">
        </div>
        <div class="mySlides fade">
            <img src="Slides3.jpg" alt="View 3">
        </div>
        <div class="mySlides fade">
            <img src="Slides4.jpg" alt="View 4">
        </div>
        
        <div class="dot-container">
            <span class="dot"></span> 
            <span class="dot"></span> 
            <span class="dot"></span> 
            <span class="dot"></span> 
        </div>
    </section>

    <section class="login-box glass-panel">
        <h2>WELCOME TO LUNA VISTA RESORT</h2>
        <h6>Please Enter the Following to Continue</h6>
        <form action="Reservation.html">
            <label>Username</label>
            <input type="text" required>
            
            <label>Password</label>
            <input type="password" required>
            
            <button type="submit">Login</button>
        </form>
    </section>
</main>

<script>
    let slideIndex = 0;
    showSlides();

    function showSlides() {
        let slides = document.getElementsByClassName("mySlides");
        let bgSlides = document.getElementsByClassName("bg-slide");
        let dots = document.getElementsByClassName("dot");

        for (let i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
            bgSlides[i].classList.remove("active-bg");
        }
        
        slideIndex++;
        if (slideIndex > slides.length) {slideIndex = 1}    
        
        for (let i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
        }

        slides[slideIndex-1].style.display = "block";  
        bgSlides[slideIndex-1].classList.add("active-bg");
        dots[slideIndex-1].className += " active";
        
        setTimeout(showSlides, 3500);
    }
</script>

</body>
</html>
