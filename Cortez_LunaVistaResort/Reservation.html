<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Vista Resort | Premium Booking</title>
    <style>
        :root {
            --ocean-blue: #1e3c72;
            --accent-cyan: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--ocean-blue);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* AMBIENT BACKGROUND CAROUSEL (BLURRED) */
        .bg-carousel-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .bg-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            filter: blur(50px) brightness(0.4) saturate(1.5);
            transition: opacity 1.5s ease-in-out;
            transform: scale(1.1);
        }

        .bg-slide.active { opacity: 1; }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(10, 25, 47, 0.8) 100%);
            z-index: -1;
        }

        nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0; z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }

        .nav-links { display: flex; gap: 20px; }
        .nav-links button {
            background: none; border: none; color: white;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; font-size: 0.85rem; padding: 10px;
        }
        .nav-links button:hover { color: var(--accent-cyan); }

        .itinerary-btn {
            background: var(--accent-cyan) !important;
            color: #000 !important;
            border-radius: 5px;
            font-weight: bold;
            padding: 10px 20px !important;
        }

        /* ITINERARY MODAL STYLES */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(15, 32, 67, 0.9);
            border: 1px solid var(--accent-cyan);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            cursor: pointer; font-size: 1.5rem; color: var(--accent-cyan);
        }

        .itinerary-details { text-align: left; margin-top: 20px; }
        .itinerary-item { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .itinerary-item span { color: var(--accent-cyan); font-weight: bold; display: block; font-size: 0.7rem; text-transform: uppercase; }

        .resort-header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .resort-header h2 {
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            gap: 30px;
            padding: 20px;
            max-width: 1100px;
            width: 100%;
            margin-bottom: 50px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .slideshow-box {
            flex: 1.5;
            min-width: 350px;
            position: relative;
        }

        .mySlides { display: none; }
        .mySlides img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .booking-box {
            flex: 1;
            min-width: 320px;
            padding: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .booking-box h2 { margin-top: 0; font-size: 1.6rem; letter-spacing: 1px; }
        .step { display: none; animation: fadeEffect 0.6s; }
        .step.active { display: block; }

        label {
            display: block;
            text-align: left;
            font-size: 0.75rem;
            margin-bottom: 5px;
            color: #add8e6;
            text-transform: uppercase;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            outline: none;
            color: #333;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #3a7bd5, var(--accent-cyan));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.5);
        }

        .amenity-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .amenity-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .amenity-item.selected {
            background: var(--accent-cyan);
            color: #000;
            font-weight: bold;
        }

        .dot-container {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        .dot {
            height: 8px; width: 8px; margin: 0 4px;
            background-color: rgba(255,255,255,0.4);
            border-radius: 50%; display: inline-block;
        }
        .active-dot { background-color: #fff; width: 24px; border-radius: 4px; }

        .fade { animation: fadeEffect 1.5s; }
        @keyframes fadeEffect { from { opacity: 0.4; } to { opacity: 1; } }

        @media (max-width: 850px) {
            .main-container { flex-direction: column; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="bg-carousel-container">
    <img src="Resort_Slides.jpg" class="bg-slide active">
    <img src="Resort_Slides2.jpg" class="bg-slide">
    <img src="Resort_Slides3.jpg" class="bg-slide">
    <img src="Resort_Slides4.jpg" class="bg-slide">
</div>
<div class="bg-overlay"></div>

<div class="modal-overlay" id="itineraryModal">
    <div class="modal-content">
        <span class="close-modal" onclick="toggleItinerary()">&times;</span>
        <h2 style="color: var(--accent-cyan); letter-spacing: 2px;">YOUR ITINERARY</h2>
        <div class="itinerary-details" id="itineraryDisplay">
            </div>
        <button class="btn-action" onclick="toggleItinerary()" style="margin-top: 20px;">Close View</button>
    </div>
</div>

<nav>
    <div class="logo">Luna Vista</div>
    <div class="nav-links">
        <button onclick="goToStep(1)">Dates</button>
        <button onclick="goToStep(2)">Rooms</button>
        <button onclick="goToStep(3)">Booking</button>
        <button class="itinerary-btn" onclick="toggleItinerary()">Itinerary</button>
    </div>
</nav>

<header class="resort-header">
    <h2>Luna Vista Resort</h2>
</header>

<main class="main-container">
    <section class="slideshow-box glass-panel">
        <div class="mySlides fade">
            <img src="Slides.jpg" alt="View 1">
        </div>
        <div class="mySlides fade">
            <img src="Slides2.jpg" alt="View 2">
        </div>
        <div class="mySlides fade">
            <img src="Slides3.jpg" alt="View 3">
        </div>
        <div class="mySlides fade">
            <img src="Slides4.jpg" alt="View 4">
        </div>
        
        <div class="dot-container">
            <span class="dot"></span> 
            <span class="dot"></span> 
            <span class="dot"></span> 
            <span class="dot"></span> 
        </div>
    </section>

    <section class="booking-box glass-panel">
        <div class="step active" id="step1">
            <h2>STAY DATES</h2>
            <label>Check-In</label>
            <input type="date" id="checkin">
            <label>Check-Out</label>
            <input type="date" id="checkout">
            <button class="btn-action" onclick="nextStep()">Filter Rooms</button>
        </div>

        <div class="step" id="step2">
            <h2>CHOOSE ROOM</h2>
            <label>Category</label>
            <select id="roomCategory">
                <option>Deluxe Ocean Suite</option>
                <option>Azure Penthouse</option>
                <option>Family Vista Villa</option>
            </select>
            <button class="btn-action" onclick="nextStep()">Add Amenities</button>
        </div>

        <div class="step" id="step3">
            <h2>AMENITIES</h2>
            <div class="amenity-grid">
                <div class="amenity-item" onclick="toggleAmenity(this)">Spa Access</div>
                <div class="amenity-item" onclick="toggleAmenity(this)">Airport Transfer</div>
                <div class="amenity-item" onclick="toggleAmenity(this)">Early Check-in</div>
                <div class="amenity-item" onclick="toggleAmenity(this)">Breakfast Buffet</div>
            </div>
            <button class="btn-action" onclick="finishFlow()">Check-In Now</button>
        </div>
    </section>
</main>

<script>
    let slideIndex = 0;
    let selectedAmenities = [];

    showSlides();

    function showSlides() {
        let slides = document.getElementsByClassName("mySlides");
        let bgSlides = document.getElementsByClassName("bg-slide");
        let dots = document.getElementsByClassName("dot");

        for (let i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
            bgSlides[i].classList.remove("active");
        }
        
        slideIndex++;
        if (slideIndex > slides.length) {slideIndex = 1}    
        
        for (let i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active-dot", "");
        }

        slides[slideIndex-1].style.display = "block";  
        bgSlides[slideIndex-1].classList.add("active");
        dots[slideIndex-1].className += " active-dot";
        
        setTimeout(showSlides, 4000); 
    }

    // ITINERARY FUNCTIONS
    function toggleAmenity(element) {
        element.classList.toggle('selected');
        const amenityName = element.innerText;
        if (element.classList.contains('selected')) {
            selectedAmenities.push(amenityName);
        } else {
            selectedAmenities = selectedAmenities.filter(item => item !== amenityName);
        }
    }

    function toggleItinerary() {
        const modal = document.getElementById('itineraryModal');
        const display = document.getElementById('itineraryDisplay');
        
        // Grab current data
        const cin = document.getElementById('checkin').value || "Not selected";
        const cout = document.getElementById('checkout').value || "Not selected";
        const room = document.getElementById('roomCategory').value;
        const amenities = selectedAmenities.length > 0 ? selectedAmenities.join(", ") : "None selected";

        display.innerHTML = `
            <div class="itinerary-item"><span>Check-In</span>${cin}</div>
            <div class="itinerary-item"><span>Check-Out</span>${cout}</div>
            <div class="itinerary-item"><span>Room Style</span>${room}</div>
            <div class="itinerary-item"><span>Requested Amenities</span>${amenities}</div>
        `;

        modal.style.display = (modal.style.display === "flex") ? "none" : "flex";
    }

    let currentStep = 1;
    function goToStep(num) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + num).classList.add('active');
        currentStep = num;
    }

    function nextStep() {
        if (currentStep < 3) goToStep(currentStep + 1);
    }

    function finishFlow() {
        alert("Check-in Successful! You can view your selections in the Itinerary.");
    }

    document.getElementById('checkin').valueAsDate = new Date();
</script>

</body>
</html>
